name: Publish to PyPI on new release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: ${{ startsWith(github.event.release.tag_name, 'ai-personas') == false }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - run: |
          TAG="find-project-root-2.1.1"
          PROJECT="${TAG%-*}"
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.x
      - run: pip install build
      - run: cd ${{ env.PROJECT }} && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          packages-dir: ${{ env.PROJECT }}/dist
