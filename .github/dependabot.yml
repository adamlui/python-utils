version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily

  - package-ecosystem: pip
    directories:
      - /
      - /find-project-root
      - /get-min-py
      - /is-unicode-supported
      - /latin-locales
      - /non-latin-locales
      - /project-markers
      - /remove-json-keys
      - /translate-messages
    schedule:
      interval: daily
    groups:
      prod-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
    versioning-strategy: increase
